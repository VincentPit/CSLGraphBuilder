services:

  # ── Neo4j ────────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: graphbuilder-neo4j
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "512m"
    ports:
      - "${NEO4J_BOLT_PORT:-7687}:7687"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: graphbuilder-api
    environment:
      # Database
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}"
      DATABASE_PROVIDER: "${DATABASE_PROVIDER:-in_memory}"

      # LLM
      LLM_PROVIDER: "${LLM_PROVIDER:-openai}"
      LLM_MODEL_NAME: "${LLM_MODEL_NAME:-gpt-4o-mini}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      AZURE_OPENAI_ENDPOINT: "${AZURE_OPENAI_ENDPOINT:-}"
      AZURE_OPENAI_API_VERSION: "${AZURE_OPENAI_API_VERSION:-2024-02-01}"

      # API security (leave blank to disable auth in dev)
      API_KEY: "${API_KEY:-}"

      # CORS — set to exact frontend origin in production
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"

      # Crawler
      CRAWLER_MAX_URLS: "${CRAWLER_MAX_URLS:-200}"
      CRAWLER_REQUEST_DELAY: "${CRAWLER_REQUEST_DELAY:-1.0}"
      CRAWLER_ALLOWED_DOMAINS: "${CRAWLER_ALLOWED_DOMAINS:-}"

      # Processing
      PROCESSING_CHUNK_SIZE: "${PROCESSING_CHUNK_SIZE:-512}"
      PROCESSING_CHUNK_OVERLAP: "${PROCESSING_CHUNK_OVERLAP:-50}"

      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - api_logs:/app/logs
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: graphbuilder-frontend
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
      NEXT_PUBLIC_API_KEY: "${NEXT_PUBLIC_API_KEY:-}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Nginx reverse proxy (optional — enable with: docker compose --profile nginx up)
  nginx:
    profiles: ["nginx"]
    image: nginx:1.27-alpine
    container_name: graphbuilder-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  api_logs:
